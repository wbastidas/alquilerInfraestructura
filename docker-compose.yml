services:
  mariadb:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-sgaie_root_dev}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-sgaie}
      MARIADB_USER: ${MARIADB_USER:-sgaie}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-sgaie_dev}
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: mysql+pymysql://${MARIADB_USER:-sgaie}:${MARIADB_PASSWORD:-sgaie_dev}@mariadb:3306/${MARIADB_DATABASE:-sgaie}
    ports:
      - "8000:8000"
    depends_on:
      mariadb:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./infra/plantillas:/app/plantillas

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mariadb_data:
