# Configuracion alternativa con Nginx para Windows (§3.3 de la especificacion
# tecnica), en caso de no usar IIS. Sirve el frontend estatico compilado y
# reenvia /api/* al backend FastAPI/Uvicorn local.
#
# Instalacion tipica en Windows: descomprimir nginx en C:\nginx, copiar este
# archivo a C:\nginx\conf\sgaie.conf e incluirlo desde nginx.conf principal
# con `include conf/sgaie.conf;` dentro del bloque http, o reemplazar
# directamente el server block de C:\nginx\conf\nginx.conf.
#
# Certificado TLS: usar uno emitido/gestionado por la institucion (CNEL EP);
# ajustar ssl_certificate / ssl_certificate_key a las rutas reales del servidor.

server {
    listen 80;
    server_name sgaie.cnel.example.ec;
    # Redirige todo el trafico HTTP a HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name sgaie.cnel.example.ec;

    ssl_certificate      C:/certificados/sgaie.crt;
    ssl_certificate_key  C:/certificados/sgaie.key;
    ssl_protocols        TLSv1.2 TLSv1.3;

    # Webroot con el build de produccion del frontend (frontend/dist),
    # publicado por infra/windows/publicar-frontend.ps1.
    root C:/inetpub/sgaie;
    index index.html;

    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Reverse proxy hacia el backend FastAPI/Uvicorn (servicio de Windows).
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: cualquier ruta de frontend que no exista como archivo
    # estatico se resuelve contra index.html (React Router).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
